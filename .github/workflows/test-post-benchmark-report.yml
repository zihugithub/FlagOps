name: Test post-benchmark-report action

on:
  push:
    paths:
      - 'actions/post-benchmark-report/**'
      - '.github/workflows/test-post-benchmark-report.yml'
  pull_request:
    paths:
      - 'actions/post-benchmark-report/**'
      - '.github/workflows/test-post-benchmark-report.yml'
  workflow_dispatch:

jobs:
  test-upload-success:
    name: Upload succeeds with valid report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy benchmark report
        run: |
          cat > benchmark_metrics.json <<'EOF'
          {
            "elapsed time per iteration (ms):": [8572.3, 766.4, 308.1, 306.5, 306.5],
            "throughput per GPU (TFLOP/s/GPU):": [1.4, 16.2, 39.9, 39.5, 40.4]
          }
          EOF

      - name: Run post-benchmark-report
        id: upload
        uses: ./actions/post-benchmark-report
        with:
          backend_url: https://httpbin.org/anything
          report_path: benchmark_metrics.json
          list_code: 'test-benchmark'
          list_name: 'Test Benchmark'
          header_config: '[{"field":"metric","name":"Metric","required":true,"sortable":true,"type":"string"},{"field":"value","name":"Value","required":true,"sortable":true,"type":"number"}]'
          fail_on_error: 'false'

      - name: Check all outputs exist
        run: |
          echo "header_status=${{ steps.upload.outputs.header_status }}"
          echo "upload_status=${{ steps.upload.outputs.upload_status }}"
          echo "query_status=${{ steps.upload.outputs.query_status }}"
          echo "query_result=${{ steps.upload.outputs.query_result }}"
          echo "Action completed without hard failure"

  test-fail-on-missing-file:
    name: Fails when report file is missing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run post-benchmark-report with missing file
        id: upload
        continue-on-error: true
        uses: ./actions/post-benchmark-report
        with:
          backend_url: https://httpbin.org/anything
          report_path: non_existent_report.json
          list_code: 'test-missing'
          header_config: '[{"field":"metric","name":"Metric","required":true,"sortable":true,"type":"string"},{"field":"value","name":"Value","required":true,"sortable":true,"type":"number"}]'
          fail_on_error: 'true'

      - name: Assert step failed
        run: |
          if [ "${{ steps.upload.outcome }}" != "failure" ]; then
            echo "::error::Expected failure but got ${{ steps.upload.outcome }}"
            exit 1
          fi
          echo "Action correctly failed on missing file"

  test-warn-on-missing-file:
    name: Warns but succeeds when fail_on_error is false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run post-benchmark-report with missing file (no fail)
        id: upload
        uses: ./actions/post-benchmark-report
        with:
          backend_url: https://httpbin.org/anything
          report_path: non_existent_report.json
          list_code: 'test-warn'
          header_config: '[{"field":"metric","name":"Metric","required":true,"sortable":true,"type":"string"},{"field":"value","name":"Value","required":true,"sortable":true,"type":"number"}]'
          fail_on_error: 'false'

      - name: Assert step succeeded
        run: |
          if [ "${{ steps.upload.outcome }}" != "success" ]; then
            echo "::error::Expected success but got ${{ steps.upload.outcome }}"
            exit 1
          fi
          echo "Action correctly warned but did not fail"

  test-default-input-resolution:
    name: Default inputs are resolved from github context
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy benchmark report
        run: |
          cat > benchmark_metrics.json <<'EOF'
          {
            "elapsed time per iteration (ms):": [308.1, 306.5],
            "throughput per GPU (TFLOP/s/GPU):": [39.9, 40.4]
          }
          EOF

      - name: Run post-benchmark-report (defaults only)
        id: upload
        uses: ./actions/post-benchmark-report
        with:
          backend_url: https://httpbin.org/anything
          report_path: benchmark_metrics.json
          list_code: 'test-defaults'
          header_config: '[{"field":"metric","name":"Metric","required":true,"sortable":true,"type":"string"},{"field":"value","name":"Value","required":true,"sortable":true,"type":"number"}]'
          fail_on_error: 'false'

      - name: Verify resolved defaults via upload response
        run: |
          RESPONSE=$(cat /tmp/upload_response.txt 2>/dev/null || echo '{}')
          echo "Response: $RESPONSE"

          # httpbin echoes JSON body back under "json" key
          REPO=$(echo "$RESPONSE" | jq -r '.json.items[0].repository_name // empty')
          WORKFLOW=$(echo "$RESPONSE" | jq -r '.json.items[0].workflow_id // empty')
          COMMIT=$(echo "$RESPONSE" | jq -r '.json.items[0].commit_id // empty')
          RUN_ID=$(echo "$RESPONSE" | jq -r '.json.items[0].run_id // empty')

          echo "repository_name = $REPO"
          echo "workflow_id     = $WORKFLOW"
          echo "commit_id       = $COMMIT"
          echo "run_id          = $RUN_ID"

          # These should be non-empty when resolved from github context
          for field in REPO WORKFLOW COMMIT RUN_ID; do
            value=$(eval echo "\$$field")
            if [ -n "$value" ]; then
              echo "$field resolved correctly: $value"
            else
              echo "::warning::$field was empty (httpbin may not echo JSON body)"
            fi
          done

  test-list-name-defaults-to-list-code:
    name: list_name defaults to list_code when not provided
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy benchmark report
        run: |
          cat > benchmark_metrics.json <<'EOF'
          {
            "elapsed time per iteration (ms):": [306.5],
            "throughput per GPU (TFLOP/s/GPU):": [40.4]
          }
          EOF

      - name: Run post-benchmark-report without list_name
        id: upload
        uses: ./actions/post-benchmark-report
        with:
          backend_url: https://httpbin.org/anything
          report_path: benchmark_metrics.json
          list_code: 'my-list-code'
          header_config: '[{"field":"metric","name":"Metric","required":true,"sortable":true,"type":"string"},{"field":"value","name":"Value","required":true,"sortable":true,"type":"number"}]'
          fail_on_error: 'false'

      - name: Verify list_name defaulted to list_code
        run: |
          RESPONSE=$(cat /tmp/header_response.txt 2>/dev/null || echo '{}')
          echo "Header response: $RESPONSE"

          # httpbin echoes JSON body back under "json" key
          LIST_NAME=$(echo "$RESPONSE" | jq -r '.json.list_name // empty')
          echo "list_name = $LIST_NAME"

          if [ "$LIST_NAME" = "my-list-code" ]; then
            echo "list_name correctly defaulted to list_code"
          else
            echo "::warning::Could not verify list_name default (httpbin may not echo JSON body)"
          fi

  test-custom-pagination-and-sorting:
    name: Custom pagination and sorting params are passed correctly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy benchmark report
        run: |
          cat > benchmark_metrics.json <<'EOF'
          {
            "elapsed time per iteration (ms):": [766.4, 308.1],
            "throughput per GPU (TFLOP/s/GPU):": [16.2, 39.9]
          }
          EOF

      - name: Run post-benchmark-report with custom query params
        id: upload
        uses: ./actions/post-benchmark-report
        with:
          backend_url: https://httpbin.org/anything
          report_path: benchmark_metrics.json
          list_code: 'test-pagination'
          header_config: '[{"field":"metric","name":"Metric","required":true,"sortable":true,"type":"string"},{"field":"value","name":"Value","required":true,"sortable":true,"type":"number"}]'
          page_size: '5'
          page: '2'
          sort: 'updated_at'
          order: 'asc'
          fail_on_error: 'false'

      - name: Verify query params in query response
        run: |
          echo "query_status=${{ steps.upload.outputs.query_status }}"
          echo "query_result=${{ steps.upload.outputs.query_result }}"

          RESULT='${{ steps.upload.outputs.query_result }}'
          if [ -n "$RESULT" ]; then
            # httpbin echoes query args back under "args" key
            PAGE_SIZE=$(echo "$RESULT" | jq -r '.args.page_size // empty')
            PAGE=$(echo "$RESULT" | jq -r '.args.page // empty')
            SORT=$(echo "$RESULT" | jq -r '.args.sort // empty')
            ORDER=$(echo "$RESULT" | jq -r '.args.order // empty')

            echo "page_size=$PAGE_SIZE page=$PAGE sort=$SORT order=$ORDER"

            [ "$PAGE_SIZE" = "5" ] && echo "page_size correct" || echo "::warning::page_size mismatch"
            [ "$PAGE" = "2" ] && echo "page correct" || echo "::warning::page mismatch"
            [ "$SORT" = "updated_at" ] && echo "sort correct" || echo "::warning::sort mismatch"
            [ "$ORDER" = "asc" ] && echo "order correct" || echo "::warning::order mismatch"
          else
            echo "::warning::query_result was empty, cannot verify query params"
          fi

  test-api-token-passed-as-bearer:
    name: api_token is sent as Bearer auth header
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy benchmark report
        run: |
          cat > benchmark_metrics.json <<'EOF'
          {
            "elapsed time per iteration (ms):": [8572.3],
            "throughput per GPU (TFLOP/s/GPU):": [1.4]
          }
          EOF

      - name: Run post-benchmark-report with api_token
        id: upload
        uses: ./actions/post-benchmark-report
        with:
          backend_url: https://httpbin.org/anything
          report_path: benchmark_metrics.json
          list_code: 'test-auth'
          header_config: '[{"field":"metric","name":"Metric","required":true,"sortable":true,"type":"string"},{"field":"value","name":"Value","required":true,"sortable":true,"type":"number"}]'
          api_token: 'test-token-abc123'
          fail_on_error: 'false'

      - name: Verify Bearer token in upload response
        run: |
          RESPONSE=$(cat /tmp/upload_response.txt 2>/dev/null || echo '{}')
          echo "Response: $RESPONSE"

          # httpbin echoes headers back
          AUTH_HEADER=$(echo "$RESPONSE" | jq -r '.headers.Authorization // .headers.authorization // empty')
          echo "Authorization header: $AUTH_HEADER"

          if [ "$AUTH_HEADER" = "Bearer test-token-abc123" ]; then
            echo "Bearer token passed correctly"
          else
            echo "::warning::Could not verify Bearer token (got: $AUTH_HEADER)"
          fi

  test-custom-run-id:
    name: Custom run_id is passed to data upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy benchmark report
        run: |
          cat > benchmark_metrics.json <<'EOF'
          {
            "elapsed time per iteration (ms):": [306.5, 306.5],
            "throughput per GPU (TFLOP/s/GPU):": [39.5, 40.4]
          }
          EOF

      - name: Run post-benchmark-report with custom run_id
        id: upload
        uses: ./actions/post-benchmark-report
        with:
          backend_url: https://httpbin.org/anything
          report_path: benchmark_metrics.json
          list_code: 'test-run-id'
          header_config: '[{"field":"metric","name":"Metric","required":true,"sortable":true,"type":"string"},{"field":"value","name":"Value","required":true,"sortable":true,"type":"number"}]'
          run_id: 'custom-run-12345'
          fail_on_error: 'false'

      - name: Verify custom run_id in upload response
        run: |
          RESPONSE=$(cat /tmp/upload_response.txt 2>/dev/null || echo '{}')
          echo "Response: $RESPONSE"

          RUN_ID=$(echo "$RESPONSE" | jq -r '.json.items[0].run_id // empty')
          echo "run_id = $RUN_ID"

          if [ "$RUN_ID" = "custom-run-12345" ]; then
            echo "Custom run_id passed correctly"
          else
            echo "::warning::Could not verify custom run_id (got: $RUN_ID)"
          fi
