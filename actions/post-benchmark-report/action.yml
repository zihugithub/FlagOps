name: 'Post benchmark Report'
description: 'Upload benchmark data to backend and query list data with pagination and sorting'

inputs:
  backend_url:
    description: 'Backend base URL (e.g. http://host:port)'
    required: true
  report_path:
    description: 'Path to the benchmark JSON report file'
    required: true
  api_token:
    description: 'Bearer token for authentication (optional)'
    required: false
    default: ''
  list_code:
    description: 'List code identifier'
    required: true
  list_name:
    description: 'List display name'
    required: false
    default: ''
  header_config:
    description: 'JSON array of header config for custom table columns'
    required: true
  repository_name:
    description: 'Repository name (defaults to github.repository)'
    required: false
    default: ''
  workflow_id:
    description: 'Workflow run ID (defaults to github.run_id)'
    required: false
    default: ''
  commit_id:
    description: 'GitHub commit SHA (defaults to github.sha)'
    required: false
    default: ''
  run_id:
    description: 'GitHub Actions run ID (defaults to github.run_id)'
    required: false
    default: ''
  page_size:
    description: 'Number of items per page for query (default: 10)'
    required: false
    default: '10'
  page:
    description: 'Page number for query (default: 1)'
    required: false
    default: '1'
  sort:
    description: 'Sort field for query (e.g. created_at, updated_at)'
    required: false
    default: 'created_at'
  order:
    description: 'Sort direction for query (asc or desc)'
    required: false
    default: 'desc'
  fail_on_error:
    description: 'Whether to fail the step on error'
    required: false
    default: 'true'

outputs:
  header_status:
    description: 'HTTP status code from the header config request'
    value: ${{ steps.header.outputs.status }}
  upload_status:
    description: 'HTTP status code from the data upload request'
    value: ${{ steps.upload.outputs.status }}
  query_status:
    description: 'HTTP status code from the data query request'
    value: ${{ steps.query.outputs.status }}
  query_result:
    description: 'JSON response from the data query request'
    value: ${{ steps.query.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Resolve inputs and validate
      id: resolve
      shell: bash
      run: |
        set -euo pipefail

        # Resolve repository_name
        REPO_NAME="${{ inputs.repository_name }}"
        if [ -z "$REPO_NAME" ]; then
          REPO_NAME="${{ github.repository }}"
        fi
        echo "repository_name=$REPO_NAME" >> "$GITHUB_OUTPUT"

        # Resolve workflow_id
        WORKFLOW_ID="${{ inputs.workflow_id }}"
        if [ -z "$WORKFLOW_ID" ]; then
          WORKFLOW_ID="${{ github.run_id }}"
        fi
        echo "workflow_id=$WORKFLOW_ID" >> "$GITHUB_OUTPUT"

        # Resolve commit_id
        COMMIT_ID="${{ inputs.commit_id }}"
        if [ -z "$COMMIT_ID" ]; then
          COMMIT_ID="${{ github.sha }}"
        fi
        echo "commit_id=$COMMIT_ID" >> "$GITHUB_OUTPUT"

        # Resolve run_id
        RUN_ID="${{ inputs.run_id }}"
        if [ -z "$RUN_ID" ]; then
          RUN_ID="${{ github.run_id }}"
        fi
        echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

        # Resolve list_name
        LIST_NAME="${{ inputs.list_name }}"
        if [ -z "$LIST_NAME" ]; then
          LIST_NAME="${{ inputs.list_code }}"
        fi
        echo "list_name=$LIST_NAME" >> "$GITHUB_OUTPUT"

        # Validate report file exists
        if [ ! -f "${{ inputs.report_path }}" ]; then
          echo "::error::Report file not found: ${{ inputs.report_path }}"
          if [ "${{ inputs.fail_on_error }}" = "true" ]; then
            exit 1
          else
            echo "::warning::Report file not found, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi

        echo "skip=false" >> "$GITHUB_OUTPUT"

        echo "=== Resolved inputs ==="
        echo "  repository_name: $REPO_NAME"
        echo "  workflow_id:     $WORKFLOW_ID"
        echo "  commit_id:       $COMMIT_ID"
        echo "  run_id:          $RUN_ID"
        echo "  list_code:       ${{ inputs.list_code }}"
        echo "  list_name:       $LIST_NAME"
        echo "  report_path:     ${{ inputs.report_path }}"

    - name: Post list header config
      id: header
      if: steps.resolve.outputs.skip != 'true'
      shell: bash
      run: |
        set -euo pipefail

        BACKEND_URL="${{ inputs.backend_url }}"
        BACKEND_URL="${BACKEND_URL%/}"

        HEADER_PAYLOAD=$(jq -n \
          --arg list_code "${{ inputs.list_code }}" \
          --arg list_name "${{ steps.resolve.outputs.list_name }}" \
          --argjson header_config '${{ inputs.header_config }}' \
          '{
            list_code: $list_code,
            list_name: $list_name,
            header_config: $header_config
          }')

        echo "=== Post header config ==="
        echo "URL: ${BACKEND_URL}/flagcicd-backend/list/header"
        echo "Payload:"
        echo "$HEADER_PAYLOAD" | jq .

        CURL_ARGS=(
          -s -X POST
          -w '%{http_code}'
          -o /tmp/header_response.txt
          -H "Content-Type: application/json"
          -d "$HEADER_PAYLOAD"
        )

        TOKEN="${{ inputs.api_token }}"
        if [ -n "$TOKEN" ]; then
          CURL_ARGS+=(-H "Authorization: Bearer $TOKEN")
        fi

        HTTP_STATUS=$(curl "${CURL_ARGS[@]}" "${BACKEND_URL}/flagcicd-backend/list/header")

        echo "HTTP status: $HTTP_STATUS"
        echo "Response:"
        cat /tmp/header_response.txt
        echo ""
        echo "status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"

        if [[ "$HTTP_STATUS" -ge 200 && "$HTTP_STATUS" -lt 300 ]]; then
          echo "Header config posted successfully"
        else
          # Check if the error is "list code already exists" — this is expected on subsequent runs
          RESPONSE_BODY=$(cat /tmp/header_response.txt)
          if echo "$RESPONSE_BODY" | grep -q "已存在"; then
            echo "::notice::Header config already exists for list '${{ inputs.list_code }}', skipping."
          else
            echo "::error::Header config request failed (HTTP $HTTP_STATUS)"
            if [ "${{ inputs.fail_on_error }}" = "true" ]; then
              exit 1
            fi
          fi
        fi

    - name: Post list data
      id: upload
      if: steps.resolve.outputs.skip != 'true'
      shell: bash
      env:
        HEADER_CONFIG: ${{ inputs.header_config }}
      run: |
        set -euo pipefail

        BACKEND_URL="${{ inputs.backend_url }}"
        BACKEND_URL="${BACKEND_URL%/}"
        LIST_CODE="${{ inputs.list_code }}"

        # Read report file and transform into items array
        # Input format:  { "metric_name": [values...], ... }
        # Output format: { "items": [ { "<field0>": "...", "<field1>": [...], "commit_id": "...", ... } ] }
        DATA_PAYLOAD=$(jq -n \
          --arg repository_name "${{ steps.resolve.outputs.repository_name }}" \
          --arg workflow_id "${{ steps.resolve.outputs.workflow_id }}" \
          --arg commit_id "${{ steps.resolve.outputs.commit_id }}" \
          --arg run_id "${{ steps.resolve.outputs.run_id }}" \
          --argjson header_config "$HEADER_CONFIG" \
          --slurpfile report "${{ inputs.report_path }}" \
          '{
            items: [ $report[0] | to_entries[] | {
              ($header_config[0].field): .key,
              ($header_config[1].field): .value,
              commit_id: $commit_id,
              repository_name: $repository_name,
              workflow_id: $workflow_id,
              run_id: $run_id
            } ]
          }')

        echo "=== Post list data ==="
        echo "URL: ${BACKEND_URL}/flagcicd-backend/list/data/${LIST_CODE}"
        echo "Items count: $(echo "$DATA_PAYLOAD" | jq '.items | length')"
        echo "Payload (first item sample):"
        echo "$DATA_PAYLOAD" | jq '{items_count: (.items | length), first_item: .items[0]}'

        CURL_ARGS=(
          -s -X POST
          -w '%{http_code}'
          -o /tmp/upload_response.txt
          -H "Content-Type: application/json"
          -d "$DATA_PAYLOAD"
        )

        TOKEN="${{ inputs.api_token }}"
        if [ -n "$TOKEN" ]; then
          CURL_ARGS+=(-H "Authorization: Bearer $TOKEN")
        fi

        HTTP_STATUS=$(curl "${CURL_ARGS[@]}" "${BACKEND_URL}/flagcicd-backend/list/data/${LIST_CODE}")

        echo "HTTP status: $HTTP_STATUS"
        echo "Response:"
        cat /tmp/upload_response.txt
        echo ""
        echo "status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"

        if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
          echo "::error::Data upload failed (HTTP $HTTP_STATUS)"
          if [ "${{ inputs.fail_on_error }}" = "true" ]; then
            exit 1
          fi
        else
          echo "Data upload successful"
        fi

    - name: Query list data
      id: query
      if: steps.resolve.outputs.skip != 'true' && steps.upload.outputs.status >= '200' && steps.upload.outputs.status < '300'
      shell: bash
      run: |
        set -uo pipefail

        BACKEND_URL="${{ inputs.backend_url }}"
        BACKEND_URL="${BACKEND_URL%/}"
        LIST_CODE="${{ inputs.list_code }}"

        # Build query parameters (pagination + sorting only, no metadata filters)
        QUERY_PARAMS="page_size=${{ inputs.page_size }}&page=${{ inputs.page }}&sort=${{ inputs.sort }}&order=${{ inputs.order }}"

        QUERY_URL="${BACKEND_URL}/flagcicd-backend/list/data/${LIST_CODE}?${QUERY_PARAMS}"
        echo "=== Query list data ==="
        echo "URL: $QUERY_URL"

        CURL_ARGS=(
          -s -X GET
          -w '\n%{http_code}'
          -H "Accept: application/json"
        )

        TOKEN="${{ inputs.api_token }}"
        if [ -n "$TOKEN" ]; then
          CURL_ARGS+=(-H "Authorization: Bearer $TOKEN")
        fi

        RESPONSE=$(curl "${CURL_ARGS[@]}" "$QUERY_URL")

        # Extract HTTP status (last line) and body (everything else)
        HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
        RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')

        echo "HTTP status: $HTTP_STATUS"
        echo "Response:"
        echo "$RESPONSE_BODY" | jq . 2>/dev/null || echo "$RESPONSE_BODY"
        echo "status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"

        # Store query result using heredoc delimiter for GITHUB_OUTPUT
        EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "result<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
        echo "$RESPONSE_BODY" >> "$GITHUB_OUTPUT"
        echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

        if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
          echo "::warning::Query failed (HTTP $HTTP_STATUS)"
        else
          echo "Query successful"
        fi
